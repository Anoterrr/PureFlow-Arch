name: PureFlow DataOps

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-gate:
    name: "🚀 Quality & Security Gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.3.2
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v3
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.12-${{ hashFiles('**/poetry.lock') }}

      - name: Install Dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      # 1. Python Linting (Pylint uses pyproject.toml config)
      - name: Run Pylint
        run: poetry run pylint src/ tests/

      # 2. Security Scan (Bandit)
      - name: Run Bandit (Security)
        run: poetry run bandit -r src/

      # 3. SQL Linting (SQLFluff uses pyproject.toml config)
      - name: SQLFluff Lint
        run: poetry run sqlfluff lint dbt/models/ --dialect duckdb

      # 4. Unit Testing (Pytest)
      - name: Run Pytest
        run: poetry run pytest tests/

      # 5. Docker Quality (Hadolint)
      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dockerfile
