name: PureFlow DataOps

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: poetry install

      # 1. Python Quality
      - name: Run Pylint
        run: poetry run pylint src/ dags/ tests/

      # 2. Unit Testing
      - name: Run Pytest
        run: poetry run pytest tests/

      # 3. SQL Quality
      - name: SQLFluff Lint
        run: poetry run sqlfluff lint dbt/models/ --dialect duckdb

      # 4. Docker Quality
      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dockerfile

      # 5. Security Scan
      - name: Run Bandit (Security)
        run: poetry run bandit -r src/
