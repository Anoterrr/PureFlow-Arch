pipeline_name: "pureflow_sales_pipeline"
description: "Refined Medallion Pipeline (YAML Configured)"
schedule: null
tags:
  - "sales"
  - "medallion"
  - "yaml_factory"

default_args:
  owner: "analyst"
  retries: 1  # 1 Original + 1 Retry = 2 tentativas totais
  retry_delay_minutes: 2
  start_date: "2024-03-29"

tasks:
  - id: "sales_ingestion"
    type: "python"
    python_callable: "ingestion.sales_ingest.SalesIngestor.ingest"
  
  - id: "bronze_quality_validation"
    type: "python"
    python_callable: "quality.bronze_rules.validate_bronze_quality"

  - id: "silver_business_rules"
    type: "python"
    python_callable: "transformations.bronze_to_silver.transform_bronze_to_silver"

  - id: "silver_quality_validation"
    type: "python"
    python_callable: "quality.silver_rules.validate_silver_quality"

  - id: "dbt_transformation_gold"
    type: "bash"
    command: "cd /opt/airflow/dbt && dbt run --profiles-dir . --vars '{\"execution_date\": \"{{ ds }}\"}'"
    env:
      S3_ENDPOINT: "http://minio:9000"
      EXECUTION_DATE: "{{ ds }}"

dependencies:
  - "sales_ingestion >> bronze_quality_validation"
  - "bronze_quality_validation >> silver_business_rules"
  - "silver_business_rules >> silver_quality_validation"
  - "silver_quality_validation >> dbt_transformation_gold"
