name: 'pureflow_dbt'
version: '1.0.0'
config-version: 2

profile: 'pureflow'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

vars:
  # Centralized execution date with environment variable override
  execution_date: "{{ env_var('EXECUTION_DATE', '2026-04-19') }}"

on-run-start:
  - "{{ create_external_sources() }}"

clean-targets:
  - "target"
  - "dbt_packages"

models:
  pureflow_dbt:
    sales:
      +materialized: table
      +schema: gold
      gold:
        +materialized: external
        +format: parquet
