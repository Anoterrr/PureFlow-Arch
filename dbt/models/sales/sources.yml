version: 2

sources:
  - name: silver
    description: "Cleaned and Validated Data from the Silver layer."
    schema: silver
    tables:
      - name: sales_silver
        description: "Sales transactions cleaned and validated by PureFlow Factory."
        external_location: "s3://silver/sales/dt={{ var('execution_date') }}/sales.parquet"
      - name: customers_silver
        description: "Customer data cleaned and validated by PureFlow Factory."
        external_location: "s3://silver/customers/dt={{ var('execution_date') }}/customers.parquet"
