pureflow:
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', 'data/pureflow_lakehouse.db') }}"
      schema: gold
      extensions:
        - httpfs
        - json
      settings:
        s3_endpoint: "{{ env_var('S3_ENDPOINT', 'minio:9000') | replace('http://', '') }}"
        s3_access_key_id: "{{ env_var('STORAGE_USER', 'admin') }}"
        s3_secret_access_key: "{{ env_var('STORAGE_PASSWORD', 'strongpassword123') }}"
        s3_use_ssl: false
        s3_url_style: "path"
  target: dev
