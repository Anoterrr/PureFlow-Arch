services:
  # --- MINIO: Our "External" S3 Storage ---
  minio:
    image: quay.io/minio/minio:latest
    container_name: pureflow_storage
    ports:
      - "9000:9000" # API
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: ${STORAGE_USER}
      MINIO_ROOT_PASSWORD: ${STORAGE_PASSWORD}
    volumes:
      - ./data/minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pureflow_net

  # --- MINIO INIT: Creates buckets automatically ---
  minio_init:
    image: minio/mc
    container_name: pureflow_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - STORAGE_USER=${STORAGE_USER}
      - STORAGE_PASSWORD=${STORAGE_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set pureflow http://minio:9000 $${STORAGE_USER} $${STORAGE_PASSWORD}) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb pureflow/${S3_BUCKET_LANDING:-landing-zone} || true;
      /usr/bin/mc mb pureflow/${S3_BUCKET_BRONZE:-bronze} || true;
      /usr/bin/mc mb pureflow/${S3_BUCKET_SILVER:-silver} || true;
      /usr/bin/mc mb pureflow/${S3_BUCKET_GOLD:-gold} || true;
      /usr/bin/mc mb pureflow/${S3_BUCKET_QUARANTINE:-quarantine} || true;
      echo '✅ Buckets created!';
      exit 0;
      "
    networks:
      - pureflow_net

  # --- DAGSTER: Modern Data Orchestrator ---
  dagster:
    build: .
    container_name: pureflow_dagster
    environment:
      - DAGSTER_HOME=/app/dagster_home
      - PYTHONPATH=/app/src
      - STORAGE_USER=${STORAGE_USER}
      - STORAGE_PASSWORD=${STORAGE_PASSWORD}
      - S3_ENDPOINT=http://minio:9000
      - DUCKDB_PATH=/app/data/pureflow_lakehouse.db
      - AWS_ACCESS_KEY_ID=${STORAGE_USER}
      - AWS_SECRET_ACCESS_KEY=${STORAGE_PASSWORD}
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_REGION=us-east-1
      - DUCKDB_S3_USE_SSL=false
      - DUCKDB_S3_URL_STYLE=path
    working_dir: /app
    volumes:
      - .:/app
      - ./dagster_home:/app/dagster_home
    ports:
      - "3000:3000"
    # COMPILATION GATE: Ensures dbt manifest is fresh before starting Dagster
    command: >
      bash -c "echo '🚀 Initializing PureFlow Environment...' &&
               mkdir -p /app/data &&
               cd dbt && 
               dbt compile --profiles-dir . --profile pureflow && 
               cd /app && 
               echo '✅ dbt Manifest updated. Starting Dagster...' &&
               dagster dev -h 0.0.0.0 -p 3000 -f /app/src/orchestration.py"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      minio:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    networks:
      - pureflow_net

  # --- DASHBOARD: Visual Insights for BI ---
  dashboard:
    build: .
    container_name: pureflow_dashboard
    environment:
      - STORAGE_USER=${STORAGE_USER}
      - STORAGE_PASSWORD=${STORAGE_PASSWORD}
      - S3_ENDPOINT=http://minio:9000
      - PYTHONPATH=/app/src
      - AWS_ACCESS_KEY_ID=${STORAGE_USER}
      - AWS_SECRET_ACCESS_KEY=${STORAGE_PASSWORD}
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_REGION=us-east-1
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    command: streamlit run /app/src/dashboard.py
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - pureflow_net

  # --- DBT DOCS: Lineage and Documentation ---
  dbt_docs:
    build: .
    container_name: pureflow_dbt_docs
    environment:
      - STORAGE_USER=${STORAGE_USER}
      - STORAGE_PASSWORD=${STORAGE_PASSWORD}
      - S3_ENDPOINT=http://minio:9000
      - DUCKDB_PATH=/app/data/pureflow_lakehouse.db
      - DBT_READ_ONLY=true
      - PYTHONPATH=/app/src
      - AWS_ACCESS_KEY_ID=${STORAGE_USER}
      - AWS_SECRET_ACCESS_KEY=${STORAGE_PASSWORD}
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_REGION=us-east-1
    volumes:
      - .:/app
    ports:
      - "8081:8081"
      - "8082:8082"
    # Port 8081 for dbt, 8082 for GX Reports
    command: >
      bash -c "python3 -m http.server 8082 --directory /app/gx/uncommitted/data_docs/local_site & 
               cd /app/dbt && 
               dbt docs generate --profiles-dir . --profile pureflow && 
               dbt docs serve --profiles-dir . --profile pureflow --port 8081 --host 0.0.0.0"
    depends_on:
      dagster:
        condition: service_healthy
    networks:
      - pureflow_net

networks:
  pureflow_net:
    driver: bridge
