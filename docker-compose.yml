services:
  # --- MINIO: Our "External" S3 Storage ---
  minio:
    image: quay.io/minio/minio:latest
    container_name: pureflow_storage
    ports:
      - "9000:9000" # API
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: ${STORAGE_USER}
      MINIO_ROOT_PASSWORD: ${STORAGE_PASSWORD}
    volumes:
      - ./data/minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pureflow_net

  # --- DAGSTER: Modern Data Orchestrator (Open Source) ---
  dagster:
    build: .
    container_name: pureflow_dagster
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - PYTHONPATH=/opt/dagster/app/src
      - STORAGE_USER=${STORAGE_USER}
      - STORAGE_PASSWORD=${STORAGE_PASSWORD}
      - S3_ENDPOINT=http://minio:9000
    volumes:
      - .:/opt/dagster/app
      - ./dagster_home:/opt/dagster/dagster_home
    ports:
      - "3000:3000"
    command: dagster dev -h 0.0.0.0 -p 3000 -f /opt/dagster/app/src/orchestration.py
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - pureflow_net

  # --- DASHBOARD: Visual Insights for BI ---
  dashboard:
    build: .
    container_name: pureflow_dashboard
    environment:
      - STORAGE_USER=${STORAGE_USER}
      - STORAGE_PASSWORD=${STORAGE_PASSWORD}
      - S3_ENDPOINT=http://minio:9000
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    command: streamlit run /app/src/dashboard.py
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - pureflow_net

  # --- DBT DOCS: Static documentation for data modeling and lineage ---
  dbt_docs:
    build: .
    container_name: pureflow_dbt_docs
    environment:
      - STORAGE_USER=${STORAGE_USER}
      - STORAGE_PASSWORD=${STORAGE_PASSWORD}
      - S3_ENDPOINT=http://minio:9000
    volumes:
      - .:/app
    ports:
      - "8081:8081"
    # Runs the dbt docs serve command on the dbt project folder
    command: poetry run dbt docs serve --project-dir /app/dbt --profiles-dir /app/dbt --port 8081 --host 0.0.0.0
    depends_on:
      dagster:
        condition: service_started
    networks:
      - pureflow_net

networks:
  pureflow_net:
    driver: bridge
