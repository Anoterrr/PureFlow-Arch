services:
  # --- MINIO: Our "External" S3 Storage ---
  minio:
    image: quay.io/minio/minio:latest
    container_name: pureflow_storage
    ports:
      - "9000:9000" # API
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: ${STORAGE_USER}
      MINIO_ROOT_PASSWORD: ${STORAGE_PASSWORD}
    volumes:
      - ./data/minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pureflow_net

  # --- DAGSTER: Modern Data Orchestrator ---
  dagster:
    build: .
    container_name: pureflow_dagster
    environment:
      - DAGSTER_HOME=/app/dagster_home
      - PYTHONPATH=/app/src
      - STORAGE_USER=${STORAGE_USER}
      - STORAGE_PASSWORD=${STORAGE_PASSWORD}
      - S3_ENDPOINT=http://minio:9000
      - DUCKDB_PATH=${DUCKDB_PATH}
    working_dir: /app
    volumes:
      - .:/app
      - ./dagster_home:/app/dagster_home
    ports:
      - "3000:3000"
    # COMPILATION GATE: Ensures dbt manifest is fresh before starting Dagster
    command: >
      bash -c "echo '🚀 Initializing PureFlow Environment...' &&
               cd dbt && 
               dbt compile --profiles-dir . --profile pureflow && 
               cd /app && 
               echo '✅ dbt Manifest updated. Starting Dagster...' &&
               dagster dev -h 0.0.0.0 -p 3000 -f /app/src/orchestration.py"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - pureflow_net

  # --- DASHBOARD: Visual Insights for BI ---
  dashboard:
    build: .
    container_name: pureflow_dashboard
    environment:
      - STORAGE_USER=${STORAGE_USER}
      - STORAGE_PASSWORD=${STORAGE_PASSWORD}
      - S3_ENDPOINT=http://minio:9000
      - PYTHONPATH=/app/src
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    command: streamlit run /app/src/dashboard.py
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - pureflow_net

  # --- DBT DOCS: Lineage and Documentation ---
  dbt_docs:
    build: .
    container_name: pureflow_dbt_docs
    environment:
      - STORAGE_USER=${STORAGE_USER}
      - STORAGE_PASSWORD=${STORAGE_PASSWORD}
      - S3_ENDPOINT=http://minio:9000
      - PYTHONPATH=/app/src
    volumes:
      - .:/app
    ports:
      - "8081:8081"
    # Port 8081 to avoid conflict with streamlit
    command: dbt docs serve --project-dir /app/dbt --profiles-dir /app/dbt --port 8081 --host 0.0.0.0
    depends_on:
      dagster:
        condition: service_started
    networks:
      - pureflow_net

networks:
  pureflow_net:
    driver: bridge
