services:
  # --- MINIO: Our "External" S3 Storage ---
  minio:
    image: quay.io/minio/minio:latest
    container_name: pureflow_storage
    ports:
      - "9000:9000" # API
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: ${STORAGE_USER}
      MINIO_ROOT_PASSWORD: ${STORAGE_PASSWORD}
    volumes:
      - ./data/minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pureflow_net

  # --- CREATE AIRFLOW instance ---
  airflow:
    image: apache/airflow:2.7.1-python3.11
    container_name: pureflow_airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - PYTHONPATH=/opt/airflow/src
      - _PIP_ADDITIONAL_REQUIREMENTS=duckdb dbt-duckdb great-expectations pandas deltalake python-dotenv
    volumes:
      - .:/opt/airflow
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - pureflow_net

  postgres: # Necessary for Airflow metadata
    image: postgres:13
    container_name: pureflow_metadata
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pureflow_net

  # --- CREATE BUCKETS: Automates the "Landing Zone" setup ---
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - pureflow_net
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc config host add myminio http://minio:9000 ${STORAGE_USER} ${STORAGE_PASSWORD}) do echo '...waiting for minio...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing myminio/landing-zone;
      /usr/bin/mc mb --ignore-existing myminio/bronze;
      /usr/bin/mc mb --ignore-existing myminio/silver;
      /usr/bin/mc mb --ignore-existing myminio/gold;
      exit 0;
      "

  # --- APP: The Dev Environment (Python, dbt, GX) ---
  app:
    build: .
    container_name: pureflow_app
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - pureflow_net
    stdin_open: true
    tty: true

networks:
  pureflow_net:
    driver: bridge
