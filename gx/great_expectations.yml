checkpoint_store_name: checkpoint_store
plugins_directory: /app/gx/plugins
stores:
  expectations_store:
    class_name: ExpectationsStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: /app/gx/expectations
  validation_results_store:
    class_name: ValidationResultsStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: /app/gx/uncommitted/validations
  checkpoint_store:
    class_name: CheckpointStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      suppress_store_backend_id: true
      base_directory: /app/gx/checkpoints
  validation_definition_store:
    class_name: ValidationDefinitionStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: /app/gx/validation_definitions
data_docs_sites:
  local_site:
    class_name: SiteBuilder
    show_how_to_buttons: true
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: /app/gx/uncommitted/data_docs/local_site
    site_index_builder:
      class_name: DefaultSiteIndexBuilder
config_variables_file_path: /app/gx/uncommitted/config_variables.yml
